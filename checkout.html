<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M31EPNVCX9"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-M31EPNVCX9');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Limitless Engraving</title>
  <link rel="icon" type="image/png" href="images/logo-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #fafafa; }

    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 40px 0 80px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
    }

    /* Order Summary */
    .order-summary {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      position: sticky;
      top: 100px;
    }

    .order-summary h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--navy-dark);
      margin-bottom: 24px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .order-item:last-of-type { border-bottom: none; }

    .order-item-info h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--navy-dark);
      margin-bottom: 4px;
    }

    .order-item-info p {
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.5;
    }

    .order-item-price {
      font-weight: 600;
      color: var(--navy-dark);
      white-space: nowrap;
    }

    .order-total {
      display: flex;
      justify-content: space-between;
      padding-top: 20px;
      margin-top: 8px;
      border-top: 2px solid var(--navy-dark);
      font-size: 18px;
      font-weight: 700;
      color: var(--navy-dark);
    }

    .edit-cart-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }
    .edit-cart-link:hover { text-decoration: underline; }

    /* Form */
    .checkout-form h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--navy-dark);
      margin-bottom: 8px;
    }

    .checkout-form > p {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    .step-indicators {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .step-dot {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .step-dot.active { background: var(--navy); }
    .step-dot.completed { background: var(--accent); }

    .form-step { display: none; }
    .form-step.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy-dark);
      margin-bottom: 4px;
    }

    .step-subtitle {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--navy-dark);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: #fff;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--navy);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 16px;
    }

    .form-nav {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn-back {
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-back:hover { border-color: var(--navy); color: var(--navy); }

    .btn-next {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: var(--navy-dark);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-next:hover { background: var(--navy); }

    /* Review */
    .review-section {
      background: #f5f3f0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .review-section h4 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .review-section p {
      font-size: 14px;
      color: var(--navy-dark);
      line-height: 1.6;
    }

    .btn-place-order {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 24px;
    }

    .btn-place-order:hover { background: #c9956b; transform: translateY(-1px); }

    .stripe-placeholder {
      margin-top: 16px;
      padding: 16px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      text-align: center;
      color: var(--text-light);
      font-size: 13px;
    }

    /* Confirmation */
    .confirmation {
      text-align: center;
      padding: 80px 20px;
      max-width: 500px;
      margin: 0 auto;
    }

    .confirmation-icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
      color: #4caf50;
    }

    .confirmation h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--navy-dark);
      margin-bottom: 12px;
    }

    .confirmation p {
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* Empty cart */
    .empty-cart {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-cart h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--navy-dark);
      margin-bottom: 12px;
    }

    .empty-cart p {
      color: var(--text-light);
      margin-bottom: 24px;
    }

    .page-header {
      padding: 100px 0 20px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4vw, 36px);
      color: var(--navy-dark);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav scrolled" id="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <img src="images/logo-icon.png" alt="Limitless Engraving" class="nav-logo-full" style="filter: brightness(0) saturate(100%) invert(18%) sepia(15%) saturate(800%) hue-rotate(170deg) brightness(95%)" height="44">
        <img src="images/logo-icon.png" alt="Limitless Engraving" class="nav-logo-icon" style="filter: brightness(0) saturate(100%) invert(18%) sepia(15%) saturate(800%) hue-rotate(170deg) brightness(95%)" height="36">
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html#products">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="custom.html">Custom Orders</a>
        <a href="bulk.html">Bulk Orders</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div id="checkoutContent">
    <!-- JS will render content here -->
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <img src="images/logo-icon.png" alt="Limitless Engraving" height="40" style="filter: brightness(100);">
        <p>Turning everyday items into personal, meaningful pieces.</p>
      </div>
      <div class="footer-links">
        <h4>Quick Links</h4>
        <a href="index.html#products">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="custom.html">Custom Orders</a>
        <a href="bulk.html">Bulk Orders</a>
      </div>
      <div class="footer-contact">
        <h4>Contact</h4>
        <p>limitlessengravingco@gmail.com</p>
        <p>@limitless_engraving</p>
        <p>Arizona, US</p>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; 2026 Limitless Engraving. All rights reserved.</p></div>
  </footer>

  <script src="js/cart.js"></script>
  <script>
    let currentStep = 1;
    const cart = JSON.parse(localStorage.getItem('le_cart') || '[]');

    function init() {
      if (cart.length === 0) {
        renderEmpty();
        return;
      }
      renderCheckout();
    }

    function renderEmpty() {
      document.getElementById('checkoutContent').innerHTML = `
        <div class="container empty-cart">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <h1>Your Cart is Empty</h1>
          <p>Add some products before checking out.</p>
          <a href="index.html#products" class="btn btn-primary">Browse Products</a>
        </div>
      `;
    }

    function renderCheckout() {
      let total = 0;
      const itemsHtml = cart.map(item => {
        total += item.price * (item.quantity || 1);
        return `
          <div class="order-item">
            <div class="order-item-info">
              <h4>${item.product}</h4>
              <p>
                ${item.engravingText ? 'Text: "' + item.engravingText + '"' : ''}
                ${item.font ? ' | Font: ' + item.font : ''}
                ${item.productColorName ? ' | Color: ' + item.productColorName : ''}
                ${item.hasImage ? ' | Custom image' : ''}
                ${item.quantity > 1 ? ' | Qty: ' + item.quantity : ''}
              </p>
            </div>
            <div class="order-item-price">$${(item.price * (item.quantity || 1)).toFixed(2)}</div>
          </div>
        `;
      }).join('');

      document.getElementById('checkoutContent').innerHTML = `
        <div class="container page-header">
          <a href="index.html#products" style="color:var(--accent); text-decoration:none; font-size:14px;">&larr; Continue Shopping</a>
          <h1>Checkout</h1>
        </div>
        <div class="container">
          <div class="checkout-layout">

            <!-- Order Summary -->
            <div class="order-summary">
              <h2>Order Summary</h2>
              ${itemsHtml}
              <div class="order-total">
                <span>Total</span>
                <span>$${total.toFixed(2)}</span>
              </div>
              <a href="index.html#products" class="edit-cart-link">&larr; Edit Cart</a>
            </div>

            <!-- Customer Form -->
            <div class="checkout-form">
              <div class="step-indicators">
                <div class="step-dot active" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
                <div class="step-dot" id="dot3"></div>
              </div>

              <!-- Step 1: Contact -->
              <div class="form-step active" id="step1">
                <div class="step-title">Step 1 of 3</div>
                <div class="step-subtitle">Your contact information</div>

                <div class="form-group">
                  <label for="fullName">Full Name *</label>
                  <input type="text" id="fullName" placeholder="John Smith" required>
                </div>
                <div class="form-group">
                  <label for="email">Email *</label>
                  <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                  <label for="phone">Phone *</label>
                  <input type="tel" id="phone" placeholder="(555) 123-4567" required>
                </div>
                <div class="form-nav">
                  <button class="btn-next" onclick="goToStep(2)">Continue to Shipping</button>
                </div>
              </div>

              <!-- Step 2: Shipping -->
              <div class="form-step" id="step2">
                <div class="step-title">Step 2 of 3</div>
                <div class="step-subtitle">Shipping address</div>

                <div class="form-group">
                  <label for="address">Street Address *</label>
                  <input type="text" id="address" placeholder="123 Main St" required>
                </div>
                <div class="form-group">
                  <label for="apt">Apt / Suite</label>
                  <input type="text" id="apt" placeholder="Apt 4B">
                </div>
                <div class="form-group">
                  <label for="city">City *</label>
                  <input type="text" id="city" placeholder="Phoenix" required>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="state">State *</label>
                    <select id="state" required>
                      <option value="" disabled selected>Select</option>
                      <option>Alabama</option><option>Alaska</option><option>Arizona</option><option>Arkansas</option>
                      <option>California</option><option>Colorado</option><option>Connecticut</option><option>Delaware</option>
                      <option>Florida</option><option>Georgia</option><option>Hawaii</option><option>Idaho</option>
                      <option>Illinois</option><option>Indiana</option><option>Iowa</option><option>Kansas</option>
                      <option>Kentucky</option><option>Louisiana</option><option>Maine</option><option>Maryland</option>
                      <option>Massachusetts</option><option>Michigan</option><option>Minnesota</option><option>Mississippi</option>
                      <option>Missouri</option><option>Montana</option><option>Nebraska</option><option>Nevada</option>
                      <option>New Hampshire</option><option>New Jersey</option><option>New Mexico</option><option>New York</option>
                      <option>North Carolina</option><option>North Dakota</option><option>Ohio</option><option>Oklahoma</option>
                      <option>Oregon</option><option>Pennsylvania</option><option>Rhode Island</option><option>South Carolina</option>
                      <option>South Dakota</option><option>Tennessee</option><option>Texas</option><option>Utah</option>
                      <option>Vermont</option><option>Virginia</option><option>Washington</option><option>West Virginia</option>
                      <option>Wisconsin</option><option>Wyoming</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="zip">ZIP Code *</label>
                    <input type="text" id="zip" placeholder="85001" required>
                  </div>
                </div>
                <div class="form-nav">
                  <button class="btn-back" onclick="goToStep(1)">Back</button>
                  <button class="btn-next" onclick="goToStep(3)">Review Order</button>
                </div>
              </div>

              <!-- Step 3: Review -->
              <div class="form-step" id="step3">
                <div class="step-title">Step 3 of 3</div>
                <div class="step-subtitle">Review and place your order</div>

                <div class="review-section">
                  <h4>Contact</h4>
                  <p id="reviewContact"></p>
                </div>

                <div class="review-section">
                  <h4>Shipping To</h4>
                  <p id="reviewShipping"></p>
                </div>

                <div class="review-section">
                  <h4>Items (${cart.length})</h4>
                  <div id="reviewItems"></div>
                </div>

                <div class="order-total" style="margin-top:16px;">
                  <span>Total</span>
                  <span>$${total.toFixed(2)}</span>
                </div>

                <!-- TODO: Replace with Stripe Checkout when ready -->
                <button class="btn-place-order" onclick="placeOrder()">Place Order | $${total.toFixed(2)}</button>

                <div class="stripe-placeholder">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:4px;"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                  Secure payment via Stripe coming soon. Orders are confirmed manually for now.
                </div>

                <div class="form-nav" style="margin-top:16px;">
                  <button class="btn-back" onclick="goToStep(2)">Back</button>
                </div>
              </div>

            </div>
          </div>
        </div>
      `;
    }

    function goToStep(step) {
      // Validate current step
      if (step > currentStep) {
        if (currentStep === 1) {
          const name = document.getElementById('fullName').value.trim();
          const email = document.getElementById('email').value.trim();
          const phone = document.getElementById('phone').value.trim();
          if (!name || !email || !phone) {
            alert('Please fill in all contact fields.');
            return;
          }
        }
        if (currentStep === 2) {
          const address = document.getElementById('address').value.trim();
          const city = document.getElementById('city').value.trim();
          const state = document.getElementById('state').value;
          const zip = document.getElementById('zip').value.trim();
          if (!address || !city || !state || !zip) {
            alert('Please fill in all shipping fields.');
            return;
          }
        }
      }

      currentStep = step;

      // Update step visibility
      document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');

      // Update dots
      document.querySelectorAll('.step-dot').forEach((dot, i) => {
        dot.classList.remove('active', 'completed');
        if (i < step - 1) dot.classList.add('completed');
        if (i === step - 1) dot.classList.add('active');
      });

      // Populate review
      if (step === 3) {
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        document.getElementById('reviewContact').innerHTML = `${name}<br>${email}<br>${phone}`;

        const address = document.getElementById('address').value;
        const apt = document.getElementById('apt').value;
        const city = document.getElementById('city').value;
        const state = document.getElementById('state').value;
        const zip = document.getElementById('zip').value;
        document.getElementById('reviewShipping').innerHTML = `${address}${apt ? ', ' + apt : ''}<br>${city}, ${state} ${zip}`;

        let total = 0;
        document.getElementById('reviewItems').innerHTML = cart.map(item => {
          total += item.price * (item.quantity || 1);
          return `<p style="margin-bottom:8px;"><strong>${item.product}</strong> ${item.engravingText ? '("' + item.engravingText + '")' : ''} <span style="float:right;">$${(item.price * (item.quantity || 1)).toFixed(2)}</span></p>`;
        }).join('');
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function placeOrder() {
      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const apt = document.getElementById('apt').value;
      const city = document.getElementById('city').value;
      const state = document.getElementById('state').value;
      const zip = document.getElementById('zip').value;

      // TODO: Replace this with Stripe Checkout session creation
      // For now, send order via email
      let body = `NEW ORDER from ${name}%0D%0A%0D%0A`;
      body += `CONTACT%0D%0A`;
      body += `Name: ${name}%0D%0A`;
      body += `Email: ${email}%0D%0A`;
      body += `Phone: ${phone}%0D%0A%0D%0A`;
      body += `SHIPPING%0D%0A`;
      body += `${address}${apt ? ', ' + apt : ''}%0D%0A`;
      body += `${city}, ${state} ${zip}%0D%0A%0D%0A`;
      body += `ITEMS%0D%0A`;

      let total = 0;
      cart.forEach((item, i) => {
        total += item.price * (item.quantity || 1);
        body += `${i + 1}. ${item.product}`;
        if (item.cardType) body += ` (${item.cardType})`;
        if (item.engravingText) body += ` | Text: "${item.engravingText}"`;
        if (item.font) body += ` | Font: ${item.font}`;
        if (item.productColorName) body += ` | Color: ${item.productColorName}`;
        if (item.hasImage) body += ` | Custom design uploaded`;
        if (item.hasPreviewScreenshot) body += ` | Preview screenshot uploaded`;
        if (item.designDescription) body += `%0D%0A   Design notes: ${item.designDescription}`;
        body += ` | $${(item.price * (item.quantity || 1)).toFixed(2)}%0D%0A`;
      });

      body += `%0D%0ATOTAL: $${total.toFixed(2)}`;

      // Check if any items have uploads
      const hasUploads = cart.some(item => item.hasImage || item.hasPreviewScreenshot);
      if (hasUploads) {
        body += `%0D%0A%0D%0A--- IMPORTANT ---%0D%0APlease attach your design files and/or preview screenshots to this email before sending. This ensures we can engrave your order exactly as you designed it.`;
      }

      // Build order details for Formspree
      const formData = new FormData();
      formData.append('_subject', `New Order from ${name} | Limitless Engraving`);
      formData.append('name', name);
      formData.append('email', email);
      formData.append('phone', phone);
      formData.append('address', address);
      formData.append('order_details', decodeURIComponent(body.replace(/%0D%0A/g, '\n')));
      formData.append('total', '$' + total.toFixed(2));

      fetch('https://formspree.io/f/mwvwbzjd', {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      }).catch(() => {});

      // Clear cart and show confirmation
      localStorage.removeItem('le_cart');

      document.getElementById('checkoutContent').innerHTML = `
        <div class="container confirmation">
          <div class="confirmation-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h1>Order Submitted!</h1>
          <p>Thanks ${name}! We've received your order and will reach out within 24 hours to confirm details and arrange payment. Check your email at <strong>${email}</strong> for updates.</p>
          <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
      `;

      // Update cart badge
      if (typeof updateBadge === 'function') updateBadge();
    }

    // Mobile nav toggle
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    init();
  </script>
